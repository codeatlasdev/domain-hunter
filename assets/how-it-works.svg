<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="520" rx="16" fill="url(#bg)"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="#475569">HOW IT WORKS</text>
  
  <!-- Step 1 -->
  <rect x="300" y="60" width="200" height="44" rx="8" fill="#2563EB"/>
  <text x="400" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white">Generate Names</text>
  <text x="400" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748B">CVC / CVCV / Dictionary / Prefix+Suffix</text>
  
  <line x1="400" y1="104" x2="400" y2="140" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Step 2 -->
  <rect x="300" y="140" width="200" height="44" rx="8" fill="#1D4ED8"/>
  <text x="400" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white">DNS Check</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748B">16 resolvers — NS, A, MX — ~15ms</text>
  
  <line x1="400" y1="184" x2="400" y2="220" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Step 3 -->
  <rect x="300" y="220" width="200" height="44" rx="8" fill="#1E40AF"/>
  <text x="400" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white">RDAP Confirm</text>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748B">404 = available — 200 = taken — ~500ms</text>
  
  <line x1="400" y1="264" x2="400" y2="300" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Step 4 -->
  <rect x="300" y="300" width="200" height="44" rx="8" fill="#334155"/>
  <text x="400" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#CBD5E1">WHOIS + SSL Fallback</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748B">3 WHOIS servers — TLS cert check</text>
  
  <line x1="400" y1="344" x2="400" y2="380" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Step 5 -->
  <rect x="300" y="380" width="200" height="44" rx="8" fill="#D97706"/>
  <text x="400" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0F172A">Price Compare</text>
  <text x="400" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748B">19 registrars — cheapest first — buy links</text>
  
  <line x1="400" y1="424" x2="400" y2="460" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Step 6 -->
  <rect x="300" y="460" width="200" height="44" rx="8" fill="#059669"/>
  <text x="400" y="486" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white">Export + TUI</text>
  
  <!-- Left badge -->
  <rect x="70" y="232" width="120" height="32" rx="16" fill="#10B981" fill-opacity="0.12"/>
  <rect x="70" y="232" width="120" height="32" rx="16" stroke="#10B981" stroke-width="1"/>
  <text x="130" y="253" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#10B981">Available</text>
  <line x1="190" y1="248" x2="300" y2="248" stroke="#10B981" stroke-width="1" stroke-dasharray="4 3"/>
  
  <!-- Right badge -->
  <rect x="610" y="232" width="100" height="32" rx="16" fill="#64748B" fill-opacity="0.12"/>
  <rect x="610" y="232" width="100" height="32" rx="16" stroke="#64748B" stroke-width="1"/>
  <text x="660" y="253" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Taken</text>
  <line x1="500" y1="248" x2="610" y2="248" stroke="#64748B" stroke-width="1" stroke-dasharray="4 3"/>
  
  <!-- Speed label -->
  <text x="665" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#06B6D4">~500/s</text>
  
  <!-- TLD label -->
  <text x="135" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#A78BFA">1,437 TLDs</text>
</svg>
