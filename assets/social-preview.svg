<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0F172A"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)"/>
  
  <!-- Logo diamond -->
  <rect x="555" y="160" width="60" height="60" rx="6" fill="#2563EB"/>
  <path d="M585 170L610 195L585 220L560 195Z" fill="#EFF6FF"/>
  <path d="M585 180L600 195L585 210L570 195Z" fill="#2563EB"/>
  
  <!-- Title -->
  <text x="640" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#F8FAFC">domh</text>
  
  <!-- Subtitle -->
  <text x="640" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94A3B8">The fastest bulk domain availability checker</text>
  
  <!-- Stats -->
  <text x="380" y="420" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#60A5FA">1,437 TLDs</text>
  <text x="640" y="420" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#60A5FA">19 registrars</text>
  <text x="900" y="420" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#60A5FA">~500 domains/sec</text>
  
  <!-- Terminal mockup -->
  <rect x="340" y="460" width="600" height="120" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="362" cy="480" r="5" fill="#EF4444"/>
  <circle cx="380" cy="480" r="5" fill="#F59E0B"/>
  <circle cx="398" cy="480" r="5" fill="#10B981"/>
  <text x="365" y="520" font-family="ui-monospace, monospace" font-size="16" fill="#64748B">$</text>
  <text x="385" y="520" font-family="ui-monospace, monospace" font-size="16" fill="#E2E8F0">domh scan coolname --preset startup</text>
  <text x="365" y="550" font-family="ui-monospace, monospace" font-size="14" fill="#10B981">✓ coolname.dev</text>
  <text x="500" y="550" font-family="ui-monospace, monospace" font-size="14" fill="#10B981">✓ coolname.xyz</text>
  <text x="650" y="550" font-family="ui-monospace, monospace" font-size="14" fill="#10B981">✓ coolname.app</text>
</svg>
